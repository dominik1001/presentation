<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Context Window</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
    position: relative;
  }

  /* Stage 0: The question */
  .question {
    position: absolute;
    color: #F5F0E8;
    font-size: clamp(36px, 5vw, 64px);
    font-style: italic;
    font-weight: normal;
    letter-spacing: 0.02em;
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s ease, transform 1.5s ease;
    z-index: 3;
  }

  .question.visible { opacity: 1; }
  .question.fade-up { opacity: 0; transform: translateY(-40px); }
  .question em { font-style: normal; color: #C9A84C; }

  /* Stage 1: The context window visualization */
  .window-container {
    position: absolute;
    display: flex;
    align-items: center;
    gap: clamp(24px, 4vw, 60px);
    opacity: 0;
    transition: opacity 2s ease;
    z-index: 2;
  }

  .window-container.visible { opacity: 1; }

  .context-window {
    position: relative;
    width: clamp(400px, 50vw, 640px);
    height: 60vh;
    border: 1px solid #7A5A10;
    border-radius: 4px;
    overflow: hidden;
    background: #0A0A0A;
  }

  /* Capacity label */
  .capacity-label {
    position: absolute;
    top: -3.5vh;
    left: 0;
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(12px, 1.4vw, 16px);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .capacity-label .gold { color: #C9A84C; }

  /* Lines representing tokens/content in the window */
  .token-lines {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 12px 16px;
  }

  .token-line {
    height: 6px;
    border-radius: 3px;
    background: #F5F0E8;
    opacity: 0;
    transform: scaleX(0);
    transform-origin: left;
    transition: opacity 0.4s ease, transform 0.5s ease, background 1.2s ease;
  }

  .token-line.visible {
    opacity: 0.35;
    transform: scaleX(1);
  }

  /* Lost in the middle: dim the middle lines */
  .token-line.lost {
    opacity: 0.06;
    background: #606060;
  }

  /* Keep first and last lines bright */
  .token-line.edge {
    opacity: 0.7;
    background: #C9A84C;
  }

  /* "Lost in the middle" label */
  .lost-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #C9A84C;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(14px, 1.8vw, 22px);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 1.5s ease;
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.4);
    white-space: nowrap;
    z-index: 2;
  }

  .lost-label.visible { opacity: 1; }

  /* Bracket decoration around the lost zone */
  .bracket {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: #7A5A10;
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  .bracket.visible { opacity: 0.5; }
  .bracket.top { top: 28%; }
  .bracket.bottom { bottom: 28%; }

  /* Side annotation */
  .side-note {
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(13px, 1.5vw, 18px);
    line-height: 1.9;
    max-width: 200px;
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  .side-note.visible { opacity: 1; }
  .side-note .highlight { color: #C9A84C; }

  /* Stage 3: The punchline */
  .punchline {
    position: absolute;
    bottom: 10vh;
    color: #C9A84C;
    font-size: clamp(22px, 3vw, 42px);
    font-style: italic;
    letter-spacing: 0.03em;
    opacity: 0;
    transition: opacity 2s ease;
    text-shadow: 0 0 50px rgba(201, 168, 76, 0.25);
    z-index: 3;
  }

  .punchline.visible { opacity: 1; }

  /* Navigation hint */
  .nav-hint {
    position: absolute;
    bottom: 3vh;
    right: 4vw;
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: 14px;
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeIn 2s ease-out 1.5s forwards;
  }

  .slide-number {
    position: fixed;
    bottom: 2vh;
    right: 2.5vw;
    color: #2a2a2a;
    font-family: Calibri, Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    user-select: none;
    z-index: 4;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 0.6; }
  }
</style>
</head>
<body>

<div class="question" id="question">What can it <em>see</em>?</div>

<div class="window-container" id="windowContainer">
  <div style="position: relative;">
    <div class="capacity-label">context window — <span class="gold">1 million tokens</span></div>
    <div class="context-window" id="contextWindow">
      <div class="token-lines" id="tokenLines"></div>
      <div class="bracket top" id="bracketTop"></div>
      <div class="bracket bottom" id="bracketBottom"></div>
      <div class="lost-label" id="lostLabel">lost in the middle</div>
    </div>
  </div>
  <div class="side-note" id="sideNote">
    <span class="highlight">Beginning</span> and <span class="highlight">end</span><br>
    stay sharp.<br><br>
    The middle<br>
    fades.
  </div>
</div>

<div class="punchline" id="punchline">Structure is memory.</div>

<div class="nav-hint" id="navHint">→</div>

<div class="slide-number">7 / 10</div>

<script>
  const LINE_COUNT = 32;
  const EDGE_COUNT = 6; // lines at top and bottom that stay bright

  // Generate token lines with varied widths
  const tokenLines = document.getElementById('tokenLines');
  for (let i = 0; i < LINE_COUNT; i++) {
    const line = document.createElement('div');
    line.className = 'token-line';
    // Varied widths for visual interest
    const width = 40 + Math.sin(i * 1.7 + 3) * 25 + Math.random() * 20;
    line.style.width = Math.min(width, 92) + '%';
    line.dataset.index = i;
    tokenLines.appendChild(line);
  }

  const lines = document.querySelectorAll('.token-line');
  const question = document.getElementById('question');
  const windowContainer = document.getElementById('windowContainer');
  const lostLabel = document.getElementById('lostLabel');
  const bracketTop = document.getElementById('bracketTop');
  const bracketBottom = document.getElementById('bracketBottom');
  const sideNote = document.getElementById('sideNote');
  const punchline = document.getElementById('punchline');

  let stage = 0;
  const maxStage = 3;

  // Initial state: show question
  setTimeout(() => { question.classList.add('visible'); }, 300);

  function forward() {
    if (stage >= maxStage) {
      window.location.href = '08-agentic-loop.html';
      return;
    }
    stage++;

    if (stage === 1) {
      // Fade question, reveal context window with lines filling in
      question.classList.add('fade-up');
      setTimeout(() => {
        windowContainer.classList.add('visible');
        lines.forEach((line, i) => {
          setTimeout(() => { line.classList.add('visible'); }, i * 50);
        });
      }, 800);
    }

    if (stage === 2) {
      // "Lost in the middle" — dim middle lines, brighten edges
      lines.forEach((line, i) => {
        if (i < EDGE_COUNT || i >= LINE_COUNT - EDGE_COUNT) {
          line.classList.add('edge');
        } else {
          line.classList.add('lost');
        }
      });
      setTimeout(() => {
        lostLabel.classList.add('visible');
        bracketTop.classList.add('visible');
        bracketBottom.classList.add('visible');
      }, 600);
      setTimeout(() => {
        sideNote.classList.add('visible');
      }, 1200);
    }

    if (stage === 3) {
      punchline.classList.add('visible');
    }
  }

  function backward() {
    if (stage <= 0) {
      window.location.href = '06-system-prompt.html';
      return;
    }

    if (stage === 3) {
      punchline.classList.remove('visible');
      stage = 2;
      return;
    }

    if (stage === 2) {
      lines.forEach(line => {
        line.classList.remove('edge', 'lost');
      });
      lostLabel.classList.remove('visible');
      bracketTop.classList.remove('visible');
      bracketBottom.classList.remove('visible');
      sideNote.classList.remove('visible');
      stage = 1;
      return;
    }

    if (stage === 1) {
      windowContainer.classList.remove('visible');
      lines.forEach(l => l.classList.remove('visible'));
      question.classList.remove('fade-up');
      question.classList.add('visible');
      stage = 0;
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') forward();
    if (e.key === 'ArrowLeft') backward();
  });
</script>

</body>
</html>
