<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Three Things to Remember</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #080808;
                height: 100vh;
                width: 100vw;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: Georgia, "Times New Roman", serif;
                position: relative;
            }

            .container {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                width: clamp(500px, 60vw, 900px);
            }

            /* Each learning row — use CSS grid for vertical alignment */
            .learning {
                display: grid;
                grid-template-columns: clamp(48px, 6vw, 80px) 1fr;
                align-items: center;
                gap: clamp(20px, 2.5vw, 40px);
                opacity: 0;
                transform: translateY(12px);
                transition:
                    opacity 1.2s ease-out,
                    transform 1.2s ease-out;
            }

            .learning.visible {
                opacity: 1;
                transform: translateY(0);
            }

            .learning-number {
                font-family: Georgia, "Times New Roman", serif;
                font-size: clamp(48px, 7vw, 96px);
                color: #c9a84c;
                opacity: 0.35;
                line-height: 1;
                text-align: center;
                user-select: none;
            }

            .learning-text {
                display: flex;
                flex-direction: column;
                gap: 0.5vh;
            }

            .learning-title {
                color: #f5f0e8;
                font-size: clamp(24px, 3vw, 42px);
                font-weight: normal;
                letter-spacing: 0.02em;
            }

            .learning-desc {
                color: #606060;
                font-family: Calibri, Arial, sans-serif;
                font-size: clamp(14px, 1.5vw, 20px);
                letter-spacing: 0.03em;
                line-height: 1.4;
            }

            /* Dividers — aligned with text column */
            .divider {
                display: grid;
                grid-template-columns: clamp(48px, 6vw, 80px) 1fr;
                gap: clamp(20px, 2.5vw, 40px);
                padding: clamp(16px, 2.5vh, 28px) 0;
                opacity: 0;
                transition: opacity 1s ease-out;
            }

            .divider.visible {
                opacity: 1;
            }

            .divider-line {
                height: 1px;
                background: linear-gradient(
                    90deg,
                    #7a5a10 0%,
                    transparent 100%
                );
                opacity: 0.4;
                align-self: center;
            }

            /* Bottom quote */
            .slide-number {
                position: fixed;
                bottom: 2vh;
                right: 2.5vw;
                color: #2a2a2a;
                font-family: Calibri, Arial, sans-serif;
                font-size: 12px;
                letter-spacing: 0.05em;
                user-select: none;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="learning" id="l1">
                <div class="learning-number">1</div>
                <div class="learning-text">
                    <div class="learning-title">The System Prompt</div>
                    <div class="learning-desc">
                        Use the right tool for the task. Adapt the prompt to the
                        task at hand.
                    </div>
                </div>
            </div>

            <div class="divider" id="d1">
                <div></div>
                <div class="divider-line"></div>
            </div>

            <div class="learning" id="l2">
                <div class="learning-number">2</div>
                <div class="learning-text">
                    <div class="learning-title">The Context Window</div>
                    <div class="learning-desc">
                        When your context gets full, the model gets stupid.
                        Start fresh.
                    </div>
                </div>
            </div>

            <div class="divider" id="d2">
                <div></div>
                <div class="divider-line"></div>
            </div>

            <div class="learning" id="l3">
                <div class="learning-number">3</div>
                <div class="learning-text">
                    <div class="learning-title">The Agentic Loop</div>
                    <div class="learning-desc">
                        Think in loops. Give it the right tools.
                    </div>
                </div>
            </div>

        </div>

        <div class="slide-number">8 / 10</div>

        <script>
            // Steps: arrow-right reveals each learning (with its preceding divider), then the quote
            // Arrow-left reverses. Navigation to adjacent slides only at boundaries.
            const reveals = [
                ["l1"], // step 0: show learning 1
                ["d1", "l2"], // step 1: show divider + learning 2
                ["d2", "l3"], // step 2: show divider + learning 3
            ];

            let currentStep = -1;

            // Check if arriving from next slide (back navigation)
            const params = new URLSearchParams(window.location.search);
            if (params.get("state") === "last") {
                for (let i = 0; i < reveals.length; i++) {
                    reveals[i].forEach((id) => {
                        document.getElementById(id).classList.add("visible");
                    });
                }
                currentStep = reveals.length - 1;
            }

            function showStep(step) {
                reveals[step].forEach((id) => {
                    document.getElementById(id).classList.add("visible");
                });
            }

            function hideStep(step) {
                reveals[step].forEach((id) => {
                    document.getElementById(id).classList.remove("visible");
                });
            }

            function forward() {
                const nextStep = currentStep + 1;
                if (nextStep >= reveals.length) {
                    window.location.href = "09-end.html";
                    return;
                }
                currentStep = nextStep;
                showStep(currentStep);
            }

            function backward() {
                if (currentStep < 0) {
                    window.location.href = "07-agentic-loop.html?state=last";
                    return;
                }
                hideStep(currentStep);
                currentStep--;
            }

            document.addEventListener("keydown", (e) => {
                if (e.key === "ArrowRight") {
                    e.preventDefault();
                    forward();
                }
                if (e.key === "ArrowLeft") {
                    e.preventDefault();
                    backward();
                }
            });
        </script>
    </body>
</html>
