<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Agentic Loop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    margin: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    position: relative;
  }

  .concept-number {
    position: fixed;
    top: 4vh;
    left: 4vw;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(64px, 10vw, 120px);
    font-weight: normal;
    color: #C9A84C;
    opacity: 0.3;
    line-height: 1;
    user-select: none;
    z-index: 1;
  }

  .slide-number {
    position: fixed;
    bottom: 2vh;
    right: 2.5vw;
    color: #2a2a2a;
    font-family: Calibri, Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    user-select: none;
    z-index: 4;
  }

  .title {
    position: absolute;
    top: 8vh;
    left: 50%;
    transform: translateX(-50%);
    color: #F5F0E8;
    font-size: clamp(32px, 4.5vw, 56px);
    font-weight: normal;
    letter-spacing: 0.03em;
    opacity: 0;
    transition: opacity 1.5s ease;
    z-index: 3;
    text-align: center;
    white-space: nowrap;
  }

  .title.visible { opacity: 1; }
  .title.dimmed { opacity: 0.15; }

  /* Main layout: diagram left, terminal right */
  .main-layout {
    position: absolute;
    top: 20vh;
    left: 6vw;
    right: 4vw;
    bottom: 6vh;
    display: flex;
    gap: 4vw;
    align-items: center;
    opacity: 0;
    transition: opacity 1s ease;
    z-index: 3;
  }

  .main-layout.visible { opacity: 1; }
  .main-layout.hidden { opacity: 0; }

  /* ---- Diagram (left side) ---- */
  .diagram {
    flex: 0 0 22vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
  }

  .svg-diagram-container {
    width: 100%;
    position: relative;
  }

  .svg-diagram-container svg {
    width: 100%;
    height: auto;
    display: block;
  }


  /* ---- Terminal wrapper + tools bar ---- */
  .terminal-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-height: 62vh;
  }

  .tools-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    margin-bottom: 8px;
    font-family: Consolas, 'Courier New', monospace;
    font-size: clamp(11px, 1vw, 14px);
  }

  .tools-label {
    color: #606060;
    letter-spacing: 0.04em;
    margin-right: 2px;
  }

  .tool-chip {
    color: #F5F0E8;
    background: rgba(201, 168, 76, 0.10);
    border: 1px solid #333;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: inherit;
    letter-spacing: 0.02em;
  }

  /* ---- Terminal (right side) ---- */
  .terminal {
    flex: 1;
    min-height: 0;
    background: #0A1A0A;
    border: 1px solid #333;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .terminal-titlebar {
    height: 32px;
    background: #111;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 7px;
    flex-shrink: 0;
  }

  .terminal-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    opacity: 0.5;
  }

  .terminal-dot.red { background: #ff5f57; }
  .terminal-dot.yellow { background: #febc2e; }
  .terminal-dot.green { background: #28c840; }

  .terminal-title-text {
    flex: 1;
    text-align: center;
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  .terminal-body {
    flex: 1;
    padding: 16px 20px;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
  }

  .terminal-body::-webkit-scrollbar { display: none; }

  .term-line {
    font-family: Consolas, 'Courier New', monospace;
    font-size: clamp(14px, 1.3vw, 18px);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    transition: opacity 0.8s ease;
  }

  .term-line.dimmed { opacity: 0.3; }

  .term-line.prompt .prompt-caret { color: #C9A84C; font-weight: bold; }
  .term-line.prompt .prompt-text { color: #F5F0E8; }

  .term-line.think { color: #C9A84C; font-style: italic; }
  .term-line.think .think-label { color: #7A5A10; font-style: normal; font-size: 0.85em; }

  .term-line.act { color: #00CC44; }
  .term-line.act .act-label { color: #007722; font-size: 0.85em; }

  .term-line.result { color: #F5F0E8; opacity: 0.55; }
  .term-line.result .result-label { color: #606060; font-size: 0.85em; }

  .term-line.separator {
    border-top: 1px solid #1a2a1a;
    margin: 10px 0 6px 0;
    height: 0;
    line-height: 0;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: #C9A84C;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Takeaway */
  .takeaway {
    position: absolute;
    color: #F5F0E8;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(24px, 3.2vw, 46px);
    font-style: italic;
    letter-spacing: 0.02em;
    line-height: 1.5;
    text-align: center;
    opacity: 0;
    transition: opacity 2s ease;
    z-index: 5;
    max-width: 80vw;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .takeaway.visible { opacity: 1; }

  .takeaway .gold {
    color: #C9A84C;
    text-shadow: 0 0 50px rgba(201, 168, 76, 0.25);
  }
</style>
</head>
<body>

<div class="concept-number">3</div>

<div class="title" id="title">The Agentic Loop</div>

<div class="main-layout" id="mainLayout">
  <!-- Left: SVG diagram -->
  <div class="diagram">
    <div class="svg-diagram-container">
      <svg id="loopSvg" viewBox="0 0 260 340" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="dotGlow">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <!-- Completed iteration paths (faded) — drawn dynamically -->
        <g id="completedPaths"></g>

        <!-- Down path: Think -> Act (straight segment) -->
        <path id="pathTA" d="M 70 55 L 70 115" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
        <!-- Down path: Act -> Observe (straight segment) -->
        <path id="pathAO" d="M 70 155 L 70 215" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
        <!-- Return path: Observe -> Think (curves back up on the left) -->
        <path id="pathReturn" d="M 70 255 Q 70 285, 40 285 Q 10 285, 10 255 L 10 75 Q 10 45, 40 45 Q 55 45, 70 45" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

        <!-- Active drawing paths (gold, animated) -->
        <path id="drawTA" d="M 70 55 L 70 115" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" stroke-dasharray="60" stroke-dashoffset="60"/>
        <path id="drawAO" d="M 70 155 L 70 215" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" stroke-dasharray="60" stroke-dashoffset="60"/>
        <path id="drawReturn" d="M 70 255 Q 70 285, 40 285 Q 10 285, 10 255 L 10 75 Q 10 45, 40 45 Q 55 45, 70 45" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" stroke-dasharray="500" stroke-dashoffset="500"/>

        <!-- Step nodes -->
        <!-- Think node -->
        <circle id="nodeThink" cx="70" cy="40" r="18" fill="#080808" stroke="#2a2a2a" stroke-width="2"/>
        <text x="70" y="46" text-anchor="middle" font-size="18" fill="#606060" style="pointer-events:none;">&#x1F4AD;</text>
        <text id="labelThink" x="100" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#606060">Think</text>

        <!-- Act node -->
        <circle id="nodeAct" cx="70" cy="140" r="18" fill="#080808" stroke="#2a2a2a" stroke-width="2"/>
        <text x="70" y="146" text-anchor="middle" font-size="18" fill="#606060" style="pointer-events:none;">&#x26A1;</text>
        <text id="labelAct" x="100" y="146" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#606060">Act</text>

        <!-- Observe node -->
        <circle id="nodeObserve" cx="70" cy="240" r="18" fill="#080808" stroke="#2a2a2a" stroke-width="2"/>
        <text x="70" y="246" text-anchor="middle" font-size="18" fill="#606060" style="pointer-events:none;">&#x1F441;</text>
        <text id="labelObserve" x="100" y="246" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#606060">Observe</text>

        <!-- Traveling dot -->
        <circle id="travelDot" cx="70" cy="40" r="5" fill="#C9A84C" filter="url(#dotGlow)" opacity="0"/>
      </svg>
    </div>

  </div>

  <!-- Right: terminal -->
  <div class="terminal-wrapper">
    <div class="tools-bar">
      <span class="tools-label">Available tools</span>
      <span class="tool-chip">Read File</span>
      <span class="tool-chip">Write File</span>
    </div>
    <div class="terminal">
      <div class="terminal-titlebar">
        <div class="terminal-dot red"></div>
        <div class="terminal-dot yellow"></div>
        <div class="terminal-dot green"></div>
        <div class="terminal-title-text">claude-code</div>
      </div>
      <div class="terminal-body" id="termBody"></div>
    </div>
  </div>
</div>

<div class="takeaway" id="takeaway">
  Think what the model can do <span class="gold">best</span>.<br>Give it the right <span class="gold">tools</span>.
</div>

<div class="slide-number">7 / 10</div>

<script>
  // Steps: each arrow-right press
  const steps = [
    // Step 0: user prompt
    { type: 'prompt', text: '> Create slide 7 for the meetup', phase: null, loop: 0 },

    // Loop 1
    { type: 'separator', phase: null, loop: 1 },
    { type: 'think',  text: 'I need to read the content file to understand what slide 7 should show.', phase: 'think', loop: 1 },
    { type: 'act',    text: 'tool: Read("content/07-agentic-loop.md")', phase: 'act', loop: 1 },
    { type: 'result', text: 'The slide should explain the agentic loop using a real example.', phase: 'observe', loop: 1 },

    // Loop 2
    { type: 'separator', phase: null, loop: 2 },
    { type: 'think',  text: 'I need to match the style of existing slides.', phase: 'think', loop: 2 },
    { type: 'act',    text: 'tool: Read("slides/06-context-window.html")', phase: 'act', loop: 2 },
    { type: 'result', text: 'Dark theme, gold accents, Georgia font, arrow key navigation.', phase: 'observe', loop: 2 },

    // Loop 3
    { type: 'separator', phase: null, loop: 3 },
    { type: 'think',  text: 'Now I have everything. Time to write the slide.', phase: 'think', loop: 3 },
    { type: 'act',    text: 'tool: Write("slides/07-agentic-loop.html")', phase: 'act', loop: 3 },
    { type: 'result', text: 'Done. The file has been created.', phase: 'observe', loop: 3 },

    // Takeaway
    { type: 'takeaway' }
  ];

  let currentStep = -1;
  let typing = false;
  let typeTimer = null;
  let typeResolve = null;

  const title = document.getElementById('title');
  const mainLayout = document.getElementById('mainLayout');
  const termBody = document.getElementById('termBody');
  const takeaway = document.getElementById('takeaway');


  // SVG elements
  const nodeThink = document.getElementById('nodeThink');
  const nodeAct = document.getElementById('nodeAct');
  const nodeObserve = document.getElementById('nodeObserve');
  const labelThink = document.getElementById('labelThink');
  const labelAct = document.getElementById('labelAct');
  const labelObserve = document.getElementById('labelObserve');

  const pathTA = document.getElementById('pathTA');
  const pathAO = document.getElementById('pathAO');
  const pathReturn = document.getElementById('pathReturn');
  const drawTA = document.getElementById('drawTA');
  const drawAO = document.getElementById('drawAO');
  const drawReturn = document.getElementById('drawReturn');
  const travelDot = document.getElementById('travelDot');
  const completedPaths = document.getElementById('completedPaths');

  const nodes = [nodeThink, nodeAct, nodeObserve];
  const labels = [labelThink, labelAct, labelObserve];
  const drawPaths = [drawTA, drawAO, drawReturn];
  const basePaths = [pathTA, pathAO, pathReturn];

  const lineElements = [];

  // Track completed loops for faded path accumulation
  let completedLoops = 0;

  // Animation durations
  const PATH_DRAW_DURATION = 400; // ms
  const DOT_TRAVEL_DURATION = 350; // ms
  const RETURN_DRAW_DURATION = 700; // ms

  function resetSvgDiagram() {
    // Reset all nodes to inactive
    nodes.forEach(n => {
      n.setAttribute('stroke', '#2a2a2a');
      n.setAttribute('fill', '#080808');
    });
    labels.forEach(l => l.setAttribute('fill', '#606060'));

    // Reset base paths
    basePaths.forEach(p => p.setAttribute('stroke', '#2a2a2a'));

    // Reset draw paths (hide them)
    drawTA.style.strokeDashoffset = '60';
    drawAO.style.strokeDashoffset = '60';
    drawReturn.style.strokeDashoffset = '500';
    drawTA.style.transition = 'none';
    drawAO.style.transition = 'none';
    drawReturn.style.transition = 'none';

    // Hide traveling dot
    travelDot.setAttribute('opacity', '0');
  }

  function setNodeActive(node, label) {
    node.setAttribute('stroke', '#C9A84C');
    node.setAttribute('fill', '#0e0c08');
    label.setAttribute('fill', '#C9A84C');
  }

  function setNodeVisited(node, label) {
    node.setAttribute('stroke', '#7A5A10');
    node.setAttribute('fill', '#080808');
    label.setAttribute('fill', '#7A5A10');
  }

  function setNodeInactive(node, label) {
    node.setAttribute('stroke', '#2a2a2a');
    node.setAttribute('fill', '#080808');
    label.setAttribute('fill', '#606060');
  }

  function animateDrawPath(drawPath, duration) {
    // Force reflow to reset transition
    drawPath.style.transition = 'none';
    drawPath.getBoundingClientRect();
    drawPath.style.transition = `stroke-dashoffset ${duration}ms ease-in-out`;
    drawPath.style.strokeDashoffset = '0';
  }

  function showDrawPathInstant(drawPath) {
    drawPath.style.transition = 'none';
    drawPath.style.strokeDashoffset = '0';
  }

  function hideDrawPath(drawPath) {
    const len = drawPath.getAttribute('stroke-dasharray');
    drawPath.style.transition = 'none';
    drawPath.style.strokeDashoffset = len;
  }

  function moveDot(cx, cy, show) {
    travelDot.setAttribute('cx', cx);
    travelDot.setAttribute('cy', cy);
    travelDot.setAttribute('opacity', show ? '1' : '0');
  }

  function animateDotAlongPath(pathEl, duration, reverse) {
    return new Promise(resolve => {
      const totalLen = pathEl.getTotalLength();
      const start = performance.now();
      travelDot.setAttribute('opacity', '1');

      function tick(now) {
        const elapsed = now - start;
        let t = Math.min(elapsed / duration, 1);
        // Ease in-out
        t = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        const dist = reverse ? totalLen * (1 - t) : totalLen * t;
        const pt = pathEl.getPointAtLength(dist);
        travelDot.setAttribute('cx', pt.x);
        travelDot.setAttribute('cy', pt.y);

        if (elapsed < duration) {
          requestAnimationFrame(tick);
        } else {
          resolve();
        }
      }
      requestAnimationFrame(tick);
    });
  }

  function addCompletedLoopPath() {
    // Clone the three path segments as faded completed paths
    const paths = [
      'M 70 55 L 70 115',
      'M 70 155 L 70 215',
      'M 70 255 Q 70 285, 40 285 Q 10 285, 10 255 L 10 75 Q 10 45, 40 45 Q 55 45, 70 45'
    ];
    paths.forEach(d => {
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      p.setAttribute('d', d);
      p.setAttribute('fill', 'none');
      p.setAttribute('stroke', '#7A5A10');
      p.setAttribute('stroke-width', '1.5');
      p.setAttribute('stroke-linecap', 'round');
      p.setAttribute('opacity', '0.35');
      completedPaths.appendChild(p);
    });
  }

  function updateDiagram(phase, loop) {
    // Reset drawing paths and nodes
    resetSvgDiagram();

    if (!phase) return;

    if (phase === 'think') {
      setNodeActive(nodeThink, labelThink);
      moveDot(70, 40, true);

      // If loop > 1, we are returning from previous loop
      if (loop > 1) {
        // Show the return path drawing with animation, then fade it
        animateDrawPath(drawReturn, RETURN_DRAW_DURATION);
        animateDotAlongPath(pathReturn, RETURN_DRAW_DURATION, false).then(() => {
          moveDot(70, 40, true);
        });
      }

    } else if (phase === 'act') {
      setNodeVisited(nodeThink, labelThink);
      setNodeActive(nodeAct, labelAct);

      // Draw path from Think to Act
      animateDrawPath(drawTA, PATH_DRAW_DURATION);
      animateDotAlongPath(pathTA, DOT_TRAVEL_DURATION, false).then(() => {
        moveDot(70, 140, true);
      });

    } else if (phase === 'observe') {
      setNodeVisited(nodeThink, labelThink);
      setNodeVisited(nodeAct, labelAct);
      setNodeActive(nodeObserve, labelObserve);

      // Show Think->Act path as completed
      showDrawPathInstant(drawTA);
      drawTA.setAttribute('stroke', '#7A5A10');

      // Draw path from Act to Observe
      animateDrawPath(drawAO, PATH_DRAW_DURATION);
      animateDotAlongPath(pathAO, DOT_TRAVEL_DURATION, false).then(() => {
        moveDot(70, 240, true);
      });

      // Mark this loop iteration completed after observe
      if (loop > completedLoops) {
        // Delay slightly so animation plays first
        setTimeout(() => {
          addCompletedLoopPath();
          completedLoops = loop;
        }, PATH_DRAW_DURATION + 100);
      }
    }

  }

  function buildPrefix(step) {
    if (step.type === 'prompt') {
      return { prefix: '<span class="prompt-caret">&gt; </span><span class="prompt-text">', suffix: '</span>', raw: step.text.substring(2) };
    }
    if (step.type === 'think') {
      return { prefix: '<span class="think-label">thinking  </span>', suffix: '', raw: step.text };
    }
    if (step.type === 'act') {
      return { prefix: '<span class="act-label">  </span>', suffix: '', raw: step.text };
    }
    if (step.type === 'result') {
      return { prefix: '<span class="result-label">→ </span>', suffix: '', raw: step.text };
    }
    return { prefix: '', suffix: '', raw: '' };
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function createLineElement(step) {
    const div = document.createElement('div');
    div.classList.add('term-line');
    if (step.type === 'separator') {
      div.classList.add('separator');
    } else {
      div.classList.add(step.type);
    }
    return div;
  }

  function typeTextInElement(el, step) {
    return new Promise((resolve) => {
      typing = true;
      typeResolve = resolve;

      const info = buildPrefix(step);
      el.innerHTML = info.prefix + '<span class="cursor"></span>' + info.suffix;

      const cursorEl = el.querySelector('.cursor');
      const chars = info.raw.split('');
      let i = 0;

      const baseDelay = step.type === 'prompt' ? 35 : step.type === 'think' ? 28 : step.type === 'act' ? 18 : 22;
      const jitter = 12;

      function next() {
        if (i >= chars.length) {
          cursorEl.remove();
          typing = false;
          typeTimer = null;
          typeResolve = null;
          resolve();
          return;
        }
        cursorEl.parentNode.insertBefore(document.createTextNode(chars[i]), cursorEl);
        i++;
        const delay = baseDelay + (Math.random() * jitter * 2 - jitter);
        typeTimer = setTimeout(next, Math.max(10, delay));
      }

      next();
    });
  }

  function fastForward(el, step) {
    if (typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
    const info = buildPrefix(step);
    const label = info.prefix;
    el.innerHTML = label + escapeHtml(info.raw) + info.suffix;
    typing = false;
    if (typeResolve) { const r = typeResolve; typeResolve = null; r(); }
  }

  function dimPreviousLines() {
    let lastIdx = -1;
    for (let i = lineElements.length - 1; i >= 0; i--) {
      if (!lineElements[i].classList.contains('separator')) { lastIdx = i; break; }
    }
    lineElements.forEach((el, i) => {
      if (el.classList.contains('separator')) return;
      if (i === lastIdx) el.classList.remove('dimmed');
      else el.classList.add('dimmed');
    });
  }

  function scrollToBottom() {
    termBody.scrollTop = termBody.scrollHeight;
  }

  // Check if arriving from next slide (back navigation)
  const params = new URLSearchParams(window.location.search);
  if (params.get('state') === 'last') {
    // Show all steps up to and including takeaway
    title.classList.add('visible', 'dimmed');
    mainLayout.classList.add('visible', 'hidden');
    // Build all terminal lines (except takeaway)
    for (let i = 0; i < steps.length; i++) {
      const step = steps[i];
      if (step.type === 'takeaway') continue;
      const el = createLineElement(step);
      if (step.type !== 'separator') {
        const info = buildPrefix(step);
        el.innerHTML = info.prefix + escapeHtml(info.raw) + info.suffix;
      }
      lineElements.push(el);
      termBody.appendChild(el);
    }
    dimPreviousLines();

    // Show all completed loop paths
    for (let i = 0; i < 3; i++) addCompletedLoopPath();
    completedLoops = 3;

    currentStep = steps.length - 1; // takeaway step
    takeaway.classList.add('visible');
  } else {
    // Init
    setTimeout(() => { title.classList.add('visible'); }, 200);
  }

  async function forward() {
    if (typing) {
      const step = steps[currentStep];
      const el = lineElements[lineElements.length - 1];
      fastForward(el, step);
      return;
    }

    const nextStep = currentStep + 1;

    if (nextStep >= steps.length) {
      window.location.href = '08-summary.html';
      return;
    }

    currentStep = nextStep;
    const step = steps[currentStep];

    if (step.type === 'takeaway') {
      mainLayout.classList.add('hidden');
      title.classList.add('dimmed');
      setTimeout(() => { takeaway.classList.add('visible'); }, 600);
      return;
    }

    // Show layout
    mainLayout.classList.add('visible');
    mainLayout.classList.remove('hidden');
    title.classList.remove('dimmed');
    takeaway.classList.remove('visible');

    // Update diagram
    if (step.phase) {
      updateDiagram(step.phase, step.loop);
    } else if (step.type === 'separator') {
      // At separator, briefly clear diagram for the new loop
      updateDiagram(null, step.loop);
    } else if (step.type === 'prompt') {
      updateDiagram(null, 0);
    }

    // Add terminal line
    const el = createLineElement(step);
    lineElements.push(el);
    termBody.appendChild(el);

    if (step.type === 'separator') {
      scrollToBottom();
      return;
    }

    dimPreviousLines();
    scrollToBottom();
    await typeTextInElement(el, step);
    scrollToBottom();
  }

  function backward() {
    if (typing) {
      if (typeTimer) clearTimeout(typeTimer);
      typeTimer = null;
      typing = false;
      if (typeResolve) { const r = typeResolve; typeResolve = null; r(); }
    }

    if (currentStep < 0) {
      window.location.href = '06-context-window.html?state=last';
      return;
    }

    const step = steps[currentStep];

    if (step.type === 'takeaway') {
      takeaway.classList.remove('visible');
      mainLayout.classList.remove('hidden');
      mainLayout.classList.add('visible');
      title.classList.remove('dimmed');
      currentStep--;
      // Restore diagram to last state
      const s = steps[currentStep];
      if (s && s.phase) updateDiagram(s.phase, s.loop);
      dimPreviousLines();
      return;
    }

    // Remove last line
    if (lineElements.length > 0) {
      const removed = lineElements.pop();
      termBody.removeChild(removed);
    }

    currentStep--;

    // Recalculate completed loops based on current position
    let maxCompletedLoop = 0;
    for (let i = 0; i <= currentStep; i++) {
      if (steps[i].phase === 'observe') {
        maxCompletedLoop = steps[i].loop;
      }
    }
    // Remove excess completed paths if needed
    while (completedLoops > maxCompletedLoop) {
      // Remove last 3 children (the 3 path segments per loop)
      for (let j = 0; j < 3 && completedPaths.lastChild; j++) {
        completedPaths.removeChild(completedPaths.lastChild);
      }
      completedLoops--;
    }

    if (currentStep >= 0) {
      const s = steps[currentStep];
      if (s.phase) {
        updateDiagram(s.phase, s.loop);
      } else if (s.type === 'separator') {
        updateDiagram(null, s.loop);
      } else {
        updateDiagram(null, 0);
      }
    } else {
      updateDiagram(null, 0);
    }

    dimPreviousLines();
    scrollToBottom();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'PageDown') { e.preventDefault(); forward(); }
    if (e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); backward(); }
  });
</script>
