<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How does Claude Code work?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
  }

  .container {
    text-align: center;
    max-width: 80vw;
    opacity: 0;
    animation: fadeIn 2.5s ease-out 0.3s forwards;
  }

  .title {
    color: #F5F0E8;
    font-size: clamp(36px, 5.5vw, 72px);
    font-weight: bold;
    letter-spacing: 0.02em;
    line-height: 1.25;
    margin-bottom: 0.15em;
  }

  .title em {
    font-style: italic;
    color: #C9A84C;
  }

  .subtitle {
    color: #F5F0E8;
    font-size: clamp(22px, 3vw, 42px);
    font-style: italic;
    font-weight: normal;
    line-height: 1.3;
    opacity: 0;
    animation: fadeIn 2s ease-out 1.6s forwards;
  }

  .meta {
    margin-top: 8vh;
    opacity: 0;
    animation: fadeIn 2s ease-out 2.8s forwards;
  }

  .speaker {
    color: #C9A84C;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(16px, 2vw, 24px);
    letter-spacing: 0.05em;
  }

  .event {
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(13px, 1.4vw, 18px);
    margin-top: 1.2vh;
    letter-spacing: 0.03em;
  }

  /* Candle flame — recurring visual motif */
  .flame-wrapper {
    position: absolute;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: fadeIn 3s ease-out 3.8s forwards;
  }

  .flame {
    width: 8px;
    height: 28px;
    background: radial-gradient(ellipse at bottom, #C9A84C 0%, #7A5A10 50%, transparent 100%);
    border-radius: 50% 50% 30% 30%;
    filter: blur(1.5px);
    animation: flicker 3s ease-in-out infinite alternate;
  }

  .flame-glow {
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 20px;
    background: radial-gradient(ellipse, rgba(201, 168, 76, 0.12) 0%, transparent 70%);
    border-radius: 50%;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slide-number {
    position: fixed;
    bottom: 2vh;
    right: 2.5vw;
    color: #2a2a2a;
    font-family: Calibri, Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    user-select: none;
  }

  @keyframes flicker {
    0%   { transform: scaleY(1) scaleX(1); opacity: 0.9; }
    25%  { transform: scaleY(1.06) scaleX(0.96); opacity: 1; }
    50%  { transform: scaleY(0.94) scaleX(1.03); opacity: 0.85; }
    75%  { transform: scaleY(1.03) scaleX(0.98); opacity: 0.95; }
    100% { transform: scaleY(0.97) scaleX(1.01); opacity: 0.88; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="title">How does Claude Code <em>work?</em></div>
  <div class="subtitle">…and what can we learn from it.</div>

  <div class="meta">
    <div class="speaker">Dominik Grusemann</div>
    <div class="event">Claude Code for Everyone — Munich</div>
  </div>
</div>

<div class="flame-wrapper">
  <div class="flame"></div>
  <div class="flame-glow"></div>
</div>

<div class="slide-number">1 / 10</div>

<script>
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') window.location.href = '02-clarke-quote.html';
  });
</script>

</body>
</html>
