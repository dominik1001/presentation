<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarke Quote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
  }

  .stage {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6vw;
    max-width: 92vw;
    position: relative;
  }

  /* Images — ghostly, emerging from darkness */
  .portrait, .poster {
    flex-shrink: 0;
    opacity: 0;
    animation: fadeIn 3s ease-out 3.5s forwards;
  }

  .portrait img,
  .poster img {
    display: block;
    height: clamp(180px, 30vh, 320px);
    width: auto;
    border-radius: 4px;
    filter: grayscale(100%) brightness(0.45) contrast(1.1);
    mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
  }

  .portrait-label,
  .poster-label {
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(11px, 1.1vw, 15px);
    text-align: center;
    margin-top: 1.2vh;
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeIn 2s ease-out 5s forwards;
  }

  /* Center quote block */
  .center {
    text-align: center;
    max-width: 50vw;
    position: relative;
    flex-shrink: 1;
  }

  .quote-mark {
    position: absolute;
    top: -6vh;
    left: -3vw;
    font-size: clamp(60px, 10vw, 140px);
    color: #7A5A10;
    opacity: 0;
    animation: fadeIn 2.5s ease-out 0.2s forwards;
    user-select: none;
    line-height: 1;
  }

  .quote {
    color: #F5F0E8;
    font-size: clamp(24px, 3.5vw, 48px);
    font-style: italic;
    line-height: 1.5;
    opacity: 0;
    animation: fadeIn 3s ease-out 0.5s forwards;
  }

  .quote .magic {
    color: #C9A84C;
    text-shadow: 0 0 30px rgba(201, 168, 76, 0.25);
  }

  .attribution {
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(14px, 1.6vw, 22px);
    margin-top: 4vh;
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeIn 2s ease-out 3s forwards;
  }

  /* Candle flame — recurring visual motif */
  .flame-wrapper {
    position: absolute;
    bottom: 6vh;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: fadeIn 3s ease-out 4s forwards;
  }

  .flame {
    width: 10px;
    height: 34px;
    background: radial-gradient(ellipse at bottom, #C9A84C 0%, #7A5A10 50%, transparent 100%);
    border-radius: 50% 50% 30% 30%;
    filter: blur(1.5px);
    animation: flicker 3s ease-in-out infinite alternate;
  }

  .flame-glow {
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 24px;
    background: radial-gradient(ellipse, rgba(201, 168, 76, 0.15) 0%, transparent 70%);
    border-radius: 50%;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slide-number {
    position: fixed;
    bottom: 2vh;
    right: 2.5vw;
    color: #2a2a2a;
    font-family: Calibri, Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    user-select: none;
  }

  @keyframes flicker {
    0%   { transform: scaleY(1) scaleX(1); opacity: 0.9; }
    25%  { transform: scaleY(1.06) scaleX(0.96); opacity: 1; }
    50%  { transform: scaleY(0.94) scaleX(1.03); opacity: 0.85; }
    75%  { transform: scaleY(1.03) scaleX(0.98); opacity: 0.95; }
    100% { transform: scaleY(0.97) scaleX(1.01); opacity: 0.88; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="portrait">
    <img src="../content/assets/clarke-portrait.jpg" alt="Arthur C. Clarke, 1965">
    <div class="portrait-label">Arthur C. Clarke</div>
  </div>

  <div class="center">
    <div class="quote-mark">&ldquo;</div>
    <div class="quote">
      Any sufficiently advanced technology is indistinguishable from <span class="magic">magic.</span>
    </div>
    <div class="attribution">&mdash; Arthur C. Clarke, 1973</div>
  </div>

  <div class="poster">
    <img src="../content/assets/2001-odyssey.png" alt="2001: A Space Odyssey (1968)">
    <div class="poster-label">2001: A Space Odyssey</div>
  </div>
</div>

<div class="flame-wrapper">
  <div class="flame"></div>
  <div class="flame-glow"></div>
</div>

<div class="slide-number">3 / 10</div>

<script>
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') window.location.href = '02-dominik.html';
    if (e.key === 'ArrowRight') window.location.href = '04-the-flip.html';
  });
</script>

</body>
</html>
