<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
    position: relative;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(40px, 6vh, 72px);
    opacity: 0;
    animation: fadeIn 2s ease-out 0.3s forwards;
  }

  .title {
    color: #F5F0E8;
    font-size: clamp(36px, 5vw, 64px);
    font-style: italic;
    font-weight: normal;
    letter-spacing: 0.03em;
    text-align: center;
  }

  .title em {
    font-style: normal;
    color: #C9A84C;
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.2);
  }

  .qr-row {
    display: flex;
    gap: clamp(48px, 8vw, 120px);
    align-items: flex-start;
  }

  .qr-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    opacity: 0;
  }

  .qr-card:nth-child(1) { animation: fadeIn 1.5s ease-out 1s forwards; }
  .qr-card:nth-child(2) { animation: fadeIn 1.5s ease-out 1.4s forwards; }

  .qr-frame {
    width: clamp(140px, 18vw, 200px);
    height: clamp(140px, 18vw, 200px);
    border: 1px solid #7A5A10;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.6s ease, box-shadow 0.6s ease;
  }

  .qr-frame:hover {
    border-color: #C9A84C;
    box-shadow: 0 0 30px rgba(201, 168, 76, 0.15);
  }

  .qr-frame svg {
    width: 100%;
    height: 100%;
  }

  .qr-label {
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(13px, 1.4vw, 17px);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.6s ease;
  }

  .qr-card:hover .qr-label {
    color: #C9A84C;
  }

  .speaker {
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(14px, 1.5vw, 18px);
    letter-spacing: 0.12em;
    text-align: center;
    opacity: 0;
    animation: fadeIn 1.5s ease-out 2s forwards;
  }

  .speaker .name {
    color: #F5F0E8;
  }

  .nav-hint {
    position: absolute;
    bottom: 3vh;
    left: 4vw;
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: 14px;
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeIn 2s ease-out 2.5s forwards;
  }

  .slide-number {
    position: fixed;
    bottom: 2vh;
    right: 2.5vw;
    color: #2a2a2a;
    font-family: Calibri, Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    user-select: none;
    z-index: 2;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 0.6; }
  }

  .content { animation-fill-mode: forwards; }
  .content { animation: contentFade 2s ease-out 0.3s forwards; }
  @keyframes contentFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
