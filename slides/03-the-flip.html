<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
  }

  .container {
    text-align: center;
    max-width: 70vw;
    position: relative;
  }

  .line {
    font-size: clamp(26px, 4vw, 52px);
    font-style: italic;
    line-height: 1.5;
    transition: all 1.8s ease;
  }

  /* Before state — Clarke's original */
  .line.original {
    color: #606060;
  }

  .line.original .keyword {
    color: #606060;
    transition: all 1.8s ease;
  }

  /* After state — the flip */
  .line.flipped {
    color: #F5F0E8;
  }

  .line.flipped .keyword {
    color: #C9A84C;
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.35);
    transition: all 1.8s ease;
  }

  .caption {
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(14px, 1.6vw, 22px);
    margin-top: 5vh;
    letter-spacing: 0.04em;
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  .caption.visible {
    opacity: 1;
  }

  /* Crossfade between the two statements */
  .statement {
    position: relative;
  }

  .text-layer {
    transition: opacity 1.8s ease;
  }

  .text-layer.hidden {
    opacity: 0;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
  }

  .text-layer.visible {
    opacity: 1;
  }

  /* Prompt */
  .prompt {
    position: absolute;
    bottom: 4vh;
    left: 50%;
    transform: translateX(-50%);
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(12px, 1.2vw, 16px);
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeIn 2s ease-out 1.5s forwards;
    transition: opacity 1s ease;
  }

  .prompt.hidden {
    opacity: 0 !important;
  }

  /* Candle flame — recurring visual motif, growing */
  .flame-wrapper {
    position: absolute;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 2s ease;
  }

  .flame-wrapper.visible {
    opacity: 1;
  }

  .flame {
    width: 12px;
    height: 40px;
    background: radial-gradient(ellipse at bottom, #C9A84C 0%, #7A5A10 50%, transparent 100%);
    border-radius: 50% 50% 30% 30%;
    filter: blur(1.5px);
    animation: flicker 3s ease-in-out infinite alternate;
  }

  .flame-glow {
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 28px;
    background: radial-gradient(ellipse, rgba(201, 168, 76, 0.18) 0%, transparent 70%);
    border-radius: 50%;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slide-number {
    position: fixed;
    bottom: 2vh;
    right: 2.5vw;
    color: #2a2a2a;
    font-family: Calibri, Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    user-select: none;
  }

  @keyframes flicker {
    0%   { transform: scaleY(1) scaleX(1); opacity: 0.9; }
    25%  { transform: scaleY(1.06) scaleX(0.96); opacity: 1; }
    50%  { transform: scaleY(0.94) scaleX(1.03); opacity: 0.85; }
    75%  { transform: scaleY(1.03) scaleX(0.98); opacity: 0.95; }
    100% { transform: scaleY(0.97) scaleX(1.01); opacity: 0.88; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="statement">
    <div class="text-layer visible" id="before">
      <div class="line original">
        Any sufficiently advanced technology<br>
        is indistinguishable from <span class="keyword">magic.</span>
      </div>
    </div>
    <div class="text-layer hidden" id="after">
      <div class="line flipped">
        Any technology you <span class="keyword">understand</span><br>
        is no longer <span class="keyword">magic.</span>
      </div>
    </div>
  </div>
  <div class="caption" id="caption">— Tonight's goal</div>
</div>

<div class="flame-wrapper" id="flame">
  <div class="flame"></div>
  <div class="flame-glow"></div>
</div>

<div class="prompt" id="prompt">press →</div>

<div class="slide-number">3 / 10</div>

<script>
  let flipped = false;

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' && !flipped) {
      flipped = true;
      document.getElementById('before').classList.remove('visible');
      document.getElementById('before').classList.add('hidden');
      document.getElementById('after').classList.remove('hidden');
      document.getElementById('after').classList.add('visible');
      document.getElementById('prompt').classList.add('hidden');

      setTimeout(() => {
        document.getElementById('caption').classList.add('visible');
      }, 1400);

      setTimeout(() => {
        document.getElementById('flame').classList.add('visible');
      }, 2200);
      return;
    }

    if (e.key === 'ArrowRight' && flipped) window.location.href = '04-dominik.html';
    if (e.key === 'ArrowLeft' && !flipped) window.location.href = '02-clarke-quote.html';
    if (e.key === 'ArrowLeft' && flipped) {
      flipped = false;
      document.getElementById('after').classList.remove('visible');
      document.getElementById('after').classList.add('hidden');
      document.getElementById('before').classList.remove('hidden');
      document.getElementById('before').classList.add('visible');
      document.getElementById('caption').classList.remove('visible');
      document.getElementById('flame').classList.remove('visible');
      document.getElementById('prompt').classList.remove('hidden');
    }
  });
</script>

</body>
</html>
