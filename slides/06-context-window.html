<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Context Window</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
    position: relative;
  }

  .concept-number {
    position: fixed;
    top: 4vh;
    left: 4vw;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(64px, 10vw, 120px);
    font-weight: normal;
    color: #C9A84C;
    opacity: 0.3;
    line-height: 1;
    user-select: none;
    z-index: 1;
  }

  .slide-number {
    position: fixed;
    bottom: 2vh;
    right: 2.5vw;
    color: #2a2a2a;
    font-family: Calibri, Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    user-select: none;
    z-index: 4;
  }

  /* Title */
  .title {
    position: absolute;
    top: 8vh;
    color: #F5F0E8;
    font-size: clamp(32px, 4.5vw, 56px);
    font-weight: normal;
    letter-spacing: 0.03em;
    opacity: 0;
    transition: opacity 1.5s ease;
    z-index: 3;
    text-align: center;
  }

  .title.visible { opacity: 1; }
  .title.dimmed { opacity: 0.15; transition: opacity 1.5s ease; }

  /* Context meter */
  .meter-container {
    position: fixed;
    right: 6vw;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 50vh;
    border: 1px solid #333;
    border-radius: 14px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 1.5s ease;
    z-index: 3;
    display: flex;
    flex-direction: column-reverse;
  }

  .meter-container.visible { opacity: 1; }

  .meter-fill {
    width: 100%;
    background: linear-gradient(to top, #C9A84C, #C9A84C);
    border-radius: 0 0 13px 13px;
    transition: height 1.2s ease, background 1.2s ease;
    height: 0%;
  }

  .meter-label {
    position: fixed;
    right: 5.2vw;
    top: calc(50% + 28vh);
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s ease;
    z-index: 3;
    transform: translateX(4px);
  }

  .meter-label.visible { opacity: 0.6; }

  /* QA pairs area */
  .qa-area {
    position: absolute;
    left: 10vw;
    top: 50%;
    transform: translateY(-50%);
    width: min(65vw, 700px);
    z-index: 3;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .qa-area.visible { opacity: 1; }
  .qa-area.faded { opacity: 0; transition: opacity 1.5s ease; }

  .qa-pair {
    margin-bottom: 3.5vh;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .qa-pair.visible { opacity: 1; }
  .qa-pair.dimmed { opacity: 0.25; transition: opacity 1s ease; }

  .question-text {
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(13px, 1.5vw, 17px);
    letter-spacing: 0.06em;
    margin-bottom: 0.8vh;
    text-transform: uppercase;
  }

  .answer-text {
    font-family: Consolas, 'Courier New', monospace;
    font-size: clamp(16px, 2vw, 24px);
    line-height: 1.6;
    min-height: 1.6em;
  }

  /* Cursor blink */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: #C9A84C;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
    margin-left: 2px;
  }

  .cursor.dead {
    animation: none;
    opacity: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Takeaway */
  .takeaway {
    position: absolute;
    color: #F5F0E8;
    font-size: clamp(24px, 3.2vw, 46px);
    font-style: italic;
    letter-spacing: 0.02em;
    line-height: 1.5;
    text-align: center;
    opacity: 0;
    transition: opacity 2s ease;
    z-index: 5;
    max-width: 80vw;
  }

  .takeaway.visible { opacity: 1; }

  .takeaway .gold {
    color: #C9A84C;
    text-shadow: 0 0 50px rgba(201, 168, 76, 0.25);
  }

  /* Meter percentage label */
  .meter-percent {
    position: fixed;
    right: 4.2vw;
    top: 50%;
    transform: translateY(-50%) translateX(100%);
    color: #606060;
    font-family: Consolas, 'Courier New', monospace;
    font-size: 11px;
    opacity: 0;
    transition: opacity 1s ease, color 1s ease;
    z-index: 3;
    margin-right: -38px;
  }

  .meter-percent.visible { opacity: 0.6; }
  .meter-percent.danger { color: #aa3333; opacity: 0.8; }
</style>
</head>
<body>

<div class="concept-number">2</div>

<div class="title" id="title">The Context Window</div>

<div class="meter-container" id="meter">
  <div class="meter-fill" id="meterFill"></div>
</div>
<div class="meter-label" id="meterLabel">context</div>
<div class="meter-percent" id="meterPercent"></div>

<div class="qa-area" id="qaArea">
  <div class="qa-pair" id="qa0">
    <div class="question-text">What is the capital of France?</div>
    <div class="answer-text" id="answer0"></div>
  </div>
  <div class="qa-pair" id="qa1">
    <div class="question-text">What is the largest ocean?</div>
    <div class="answer-text" id="answer1"></div>
  </div>
  <div class="qa-pair" id="qa2">
    <div class="question-text">What is the speed of light?</div>
    <div class="answer-text" id="answer2"></div>
  </div>
  <div class="qa-pair" id="qa3">
    <div class="question-text">What does the Earth revolve around?</div>
    <div class="answer-text" id="answer3"></div>
  </div>
</div>

<div class="takeaway" id="takeaway">
  When your context gets full,<br>the model gets <span class="gold">stupid</span>.
</div>

<div class="slide-number">6 / 9</div>

<script>
  let stage = 0;
  const maxStage = 6;
  let typing = false;
  let typeTimeout = null;

  const title = document.getElementById('title');
  const meter = document.getElementById('meter');
  const meterFill = document.getElementById('meterFill');
  const meterLabel = document.getElementById('meterLabel');
  const meterPercent = document.getElementById('meterPercent');
  const qaArea = document.getElementById('qaArea');
  const takeaway = document.getElementById('takeaway');

  const qaPairs = [
    document.getElementById('qa0'),
    document.getElementById('qa1'),
    document.getElementById('qa2'),
    document.getElementById('qa3')
  ];
  const answers = [
    document.getElementById('answer0'),
    document.getElementById('answer1'),
    document.getElementById('answer2'),
    document.getElementById('answer3')
  ];

  // Answer configs: text, color, typing characteristics
  const answerConfigs = [
    {
      text: "The capital of France is Paris.",
      color: "#C9A84C",
      baseDelay: 45,
      jitter: 10,
      pauses: {},
      meterPct: 20,
      meterColor: "#C9A84C"
    },
    {
      text: "The largest ocean is... the Pacific Ocean.",
      color: "#b8a060",
      baseDelay: 50,
      jitter: 20,
      pauses: {20: 400, 21: 100}, // pause after "is..."
      meterPct: 45,
      meterColor: "#C9A84C"
    },
    {
      text: "The speed of light is approximately 300,000 km/s... as I mentioned regarding the oceans earlier...",
      color: "#887755",
      baseDelay: 60,
      jitter: 50,
      pauses: {42: 600, 43: 200, 57: 500},
      meterPct: 70,
      meterColor: "#aa7722"
    },
    {
      text: "The Earth revolves around the sun. The sun is a star. I believe you asked about France.",
      color: "#666666",
      baseDelay: 70,
      jitter: 80,
      pauses: {31: 500, 50: 700, 58: 400, 70: 600},
      meterPct: 95,
      meterColor: "#aa3333"
    }
  ];

  // Initialize: show title
  setTimeout(() => {
    title.classList.add('visible');
  }, 200);
  setTimeout(() => {
    meter.classList.add('visible');
    meterLabel.classList.add('visible');
  }, 800);

  function typeText(el, config, callback) {
    typing = true;
    const chars = config.text.split('');
    let i = 0;
    el.style.color = config.color;
    el.innerHTML = '<span class="cursor"></span>';

    function typeNext() {
      if (i >= chars.length) {
        // Remove cursor or make it dead
        const cursor = el.querySelector('.cursor');
        if (cursor) cursor.classList.add('dead');
        typing = false;
        if (callback) callback();
        return;
      }

      const span = el.querySelector('.cursor');
      const textNode = document.createTextNode(chars[i]);
      el.insertBefore(textNode, span);
      i++;

      let delay = config.baseDelay + (Math.random() * config.jitter * 2 - config.jitter);
      if (config.pauses[i]) delay += config.pauses[i];
      delay = Math.max(20, delay);

      typeTimeout = setTimeout(typeNext, delay);
    }

    typeNext();
  }

  function clearTyping() {
    if (typeTimeout) {
      clearTimeout(typeTimeout);
      typeTimeout = null;
    }
    typing = false;
  }

  function setMeter(pct, color) {
    meterFill.style.height = pct + '%';
    if (color) meterFill.style.background = `linear-gradient(to top, ${color}, ${color})`;
    meterPercent.textContent = pct + '%';
    meterPercent.classList.add('visible');
    if (pct >= 90) {
      meterPercent.classList.add('danger');
    } else {
      meterPercent.classList.remove('danger');
    }
  }

  function showStage(s) {
    // Show QA area
    qaArea.classList.add('visible');
    qaArea.classList.remove('faded');
    title.classList.remove('dimmed');
    title.classList.add('visible');
    takeaway.classList.remove('visible');

    // Reset all QA pairs
    qaPairs.forEach((qa, idx) => {
      if (idx < s) {
        qa.classList.add('visible');
        qa.classList.remove('dimmed');
        // Dim previous answers
        if (idx < s - 1) {
          qa.classList.add('dimmed');
        }
      } else {
        qa.classList.remove('visible');
        qa.classList.remove('dimmed');
      }
    });
  }

  function forward() {
    if (typing) {
      // Fast-forward current typing
      clearTyping();
      const idx = stage - 1;
      if (idx >= 0 && idx < 4) {
        const cursor = answers[idx].querySelector('.cursor');
        answers[idx].textContent = answerConfigs[idx].text;
        answers[idx].style.color = answerConfigs[idx].color;
      }
      return;
    }

    if (stage >= maxStage) {
      window.location.href = '07-agentic-loop.html';
      return;
    }
    stage++;

    if (stage >= 1 && stage <= 4) {
      const idx = stage - 1;
      showStage(stage);

      // Show current QA pair
      qaPairs[idx].classList.add('visible');
      qaPairs[idx].classList.remove('dimmed');

      // Set meter
      const config = answerConfigs[idx];
      setMeter(config.meterPct, config.meterColor);

      // Type answer
      typeText(answers[idx], config);
    }

    if (stage === 5) {
      // Takeaway
      qaArea.classList.add('faded');
      title.classList.add('dimmed');
      meterPercent.classList.remove('visible');
      setTimeout(() => {
        takeaway.classList.add('visible');
      }, 800);
    }

    if (stage === 6) {
      // Next press navigates
    }
  }

  function backward() {
    if (typing) {
      clearTyping();
    }

    if (stage <= 0) {
      window.location.href = '05-system-prompt.html';
      return;
    }

    if (stage === 6) {
      stage = 5;
      return;
    }

    if (stage === 5) {
      takeaway.classList.remove('visible');
      qaArea.classList.remove('faded');
      title.classList.remove('dimmed');

      // Restore stage 4 state
      stage = 4;
      showStage(5); // show all 4 pairs, dim first 3
      // Restore all answers
      for (let i = 0; i < 4; i++) {
        answers[i].textContent = answerConfigs[i].text;
        answers[i].style.color = answerConfigs[i].color;
        qaPairs[i].classList.add('visible');
        if (i < 3) qaPairs[i].classList.add('dimmed');
      }
      setMeter(95, '#aa3333');
      return;
    }

    // Going back from stage 1-4
    stage--;

    if (stage === 0) {
      // Hide all QA, reset meter
      qaPairs.forEach(qa => {
        qa.classList.remove('visible');
        qa.classList.remove('dimmed');
      });
      answers.forEach(a => { a.innerHTML = ''; });
      meterFill.style.height = '0%';
      meterPercent.classList.remove('visible');
      qaArea.classList.add('visible');
      return;
    }

    // Restore to current stage state
    // Remove the QA pair we just left
    const removedIdx = stage; // the one we're removing
    qaPairs[removedIdx].classList.remove('visible');
    qaPairs[removedIdx].classList.remove('dimmed');
    answers[removedIdx].innerHTML = '';

    // Un-dim the current top answer
    if (stage > 0) {
      qaPairs[stage - 1].classList.remove('dimmed');
    }

    // Restore meter to current stage
    const config = answerConfigs[stage - 1];
    setMeter(config.meterPct, config.meterColor);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') { e.preventDefault(); forward(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); backward(); }
  });
</script>

</body>
</html>
