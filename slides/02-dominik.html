<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominik Grusemann</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
  }

  .container {
    display: flex;
    align-items: center;
    gap: 6vw;
    opacity: 0;
    animation: fadeIn 2.5s ease-out 0.3s forwards;
  }

  .photo-wrapper {
    position: relative;
    flex-shrink: 0;
  }

  .photo {
    width: clamp(140px, 18vw, 240px);
    height: clamp(140px, 18vw, 240px);
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #7A5A10;
    filter: grayscale(30%) brightness(0.9);
  }

  .photo-glow {
    position: absolute;
    top: -8px;
    left: -8px;
    right: -8px;
    bottom: -8px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(201, 168, 76, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .info {
    text-align: left;
  }

  .name {
    color: #F5F0E8;
    font-size: clamp(30px, 4.5vw, 60px);
    font-weight: bold;
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .role {
    color: #C9A84C;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(16px, 2vw, 26px);
    margin-top: 1.5vh;
    letter-spacing: 0.03em;
    opacity: 0;
    animation: fadeIn 2s ease-out 1.8s forwards;
  }

  .background {
    color: #606060;
    font-family: Calibri, Arial, sans-serif;
    font-size: clamp(13px, 1.4vw, 19px);
    margin-top: 2vh;
    line-height: 1.6;
    opacity: 0;
    animation: fadeIn 2s ease-out 2.8s forwards;
  }

  /* Candle flame */
  .flame-wrapper {
    position: absolute;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: fadeIn 3s ease-out 3.8s forwards;
  }

  .flame {
    width: 12px;
    height: 40px;
    background: radial-gradient(ellipse at bottom, #C9A84C 0%, #7A5A10 50%, transparent 100%);
    border-radius: 50% 50% 30% 30%;
    filter: blur(1.5px);
    animation: flicker 3s ease-in-out infinite alternate;
  }

  .flame-glow {
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 28px;
    background: radial-gradient(ellipse, rgba(201, 168, 76, 0.18) 0%, transparent 70%);
    border-radius: 50%;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .slide-number {
    position: fixed;
    bottom: 2vh;
    right: 2.5vw;
    color: #2a2a2a;
    font-family: Calibri, Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    user-select: none;
  }

  @keyframes flicker {
    0%   { transform: scaleY(1) scaleX(1); opacity: 0.9; }
    25%  { transform: scaleY(1.06) scaleX(0.96); opacity: 1; }
    50%  { transform: scaleY(0.94) scaleX(1.03); opacity: 0.85; }
    75%  { transform: scaleY(1.03) scaleX(0.98); opacity: 0.95; }
    100% { transform: scaleY(0.97) scaleX(1.01); opacity: 0.88; }
  }
</style>
</head>
